  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Equipa M6 Trablisa</title>

    <!-- PWA icons -->
    <link rel="icon" type="image/png" href="/pwa192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA / mobile web app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Equipa M6 Trablisa" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- theme -->
    <meta name="theme-color" content="#000000" />

    <!-- social -->
    <meta property="og:title" content="Equipa M6 Trablisa" />
    <meta property="og:image" content="/pwa512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/pwa512.png" />

    <style>
      /* Splash: logo PWA redondo, tamanho grande (w-64 / 18rem), saída suave */
      #preloader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        z-index: 9999;
        transition: opacity 1s ease-out;
      }

      #preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #preloader .logo-wrap {
        width: min(50vw, 18rem);
        height: min(50vw, 18rem);
        max-width: 288px;
        max-height: 288px;
        display: grid;
        place-items: center;
      }

      #preloader img {
        width: 100%;
        height: 100%;
        min-width: 120px;
        min-height: 120px;
        -o-object-fit: contain;
           object-fit: contain;
        border-radius: 50%;
        animation: logo-entrance 1s ease-out forwards;
      }

      /* Entrada elegante: começa pequeno e com fade-in, termina em tamanho completo */
      @keyframes logo-entrance {
        0% {
          opacity: 0;
          transform: scale(0.35);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CDIyvR2q.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D344iZ0l.css">
  <link rel="manifest" href="/manifest.webmanifest"></head>

  <body>
    <!-- Splash: logo PWA redondo (pwa192.png em public/), visível pelo menos 2s, saída suave -->
    <div id="preloader">
      <div class="logo-wrap">
        <img src="/pwa192.png" alt="Liga de Clubes M6" />
      </div>
    </div>

    <div id="root"></div>


    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const pre = document.getElementById("preloader");
        const root = document.getElementById("root");
        const start = Date.now();
        const minTime = 2000;
        const fadeOutDuration = 1000;

        const stop = () => {
          const elapsed = Date.now() - start;
          const wait = Math.max(0, minTime - elapsed);

          setTimeout(() => {
            pre.classList.add("fade-out");
            setTimeout(() => pre.remove(), fadeOutDuration);
          }, wait);
        };

        const obs = new MutationObserver(() => {
          if (root.childNodes.length > 0) {
            obs.disconnect();
            stop();
          }
        });

        obs.observe(root, { childList: true });
      });
    </script>
  </body>
</html>
